<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mande Digital Card</title>

    <!-- SEO -->
    <meta name="description" content="Connect with Mande everywhere" />

    <!-- Open Graph -->
    <meta property="og:title" content="Mande Digital Card" />
    <meta property="og:description" content="Connect with me everywhere" />
    <meta property="og:image" content="assets/banner.jpg" />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- CSS -->
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link rel="stylesheet" href="styles/try.css">
    <script src="scripts/try.js" defer></script>
    <script src="scripts/sw.js" defer></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

</head>

<body>

    <a href="" class="floating-whatsapp" target="_blank">

        <i class="fa-brands fa-whatsapp"></i>

    </a>

    <div class="container">

        <button id="themeToggle" class="theme-toggle">
            <i class="fa-solid fa-moon"></i>
        </button>

        <div class="hero-banner">
            <img src="assets/banner.jpg" alt="Banner">
        </div>

        <!-- Profile -->
        <div class="profile-section">

            <img src="" alt="" class="profile-img" />

            <h1>Mande</h1>

            <p class="bio">
                Web Developer
            </p>

            <!-- Status -->
            <div class="status">

                <span id="statusDot"></span>

                <span id="statusText">
                    Online
                </span>

            </div>

            <!-- Clock -->
            <div class="live-clock">
                <h3 id="clock"></h3>
            </div>

            <!-- Stats -->
            <div class="stats">

                <div>
                    <h3 id="viewCount">0</h3>
                    <span>Views</span>
                </div>

                <div>
                    <h3>24/7</h3>
                    <span>Available</span>
                </div>

            </div>

        </div>

        <!-- Social Links -->
        <div class="links">

            <a href="" class="link-btn whatsapp" target="_blank">

                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp

            </a>

            <a href="" class="link-btn instagram" target="_blank">

                <i class="fa-brands fa-instagram"></i>
                Instagram

            </a>

            <a href="" class="link-btn tiktok" target="_blank">

                <i class="fa-brands fa-tiktok"></i>
                TikTok

            </a>

            <a href="" class="link-btn facebook" target="_blank">

                <i class="fa-brands fa-facebook"></i>
                Facebook

            </a>

            <a href="" class="link-btn email">

                <i class="fa-solid fa-envelope"></i>
                Email

            </a>

            <a href="" class="link-btn phone">

                <i class="fa-solid fa-phone"></i>
                Call Me

            </a>

            <a href="mande.vcf" class="link-btn save" download>

                <i class="fa-solid fa-address-card"></i>
                Save Contact

            </a>

            <a href="" class="link-btn portfolio" target="_blank">

                <i class="fa-solid fa-globe"></i>
                Portfolio

            </a>

        </div>

        <!-- Utility Buttons -->
        <div class="utility-buttons">

            <button class="utility-btn" onclick="copyInstagram()">

                Copy Instagram Username

            </button>

            <button id="musicToggle" class="utility-btn">

                Play Music

            </button>

        </div>

        <!-- Audio -->
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>

        <!-- QR -->
        <div class="qr-section">

            <h2>Scan My QR Code</h2>

            

            <button id="shareBtn" class="share-btn">

                <i class="fa-solid fa-share"></i>
                Share Profile

            </button>

        </div>

        <!-- Contact Form -->
        <form class="contact-form">

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <textarea placeholder="Message"></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <!-- Footer -->
        <footer>
            © 2026 Mande. All Rights Reserved.
        </footer>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
