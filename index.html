<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mande | Digital Contact Card</title>

  <!-- <link rel="stylesheet" href="style.css"/> -->
  <link rel="stylesheet" href="styles/mande.css">
  <script src="scripts/mande.js" defer></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

</head>
<body>

  <div class="container">

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle">
      <i class="fa-solid fa-moon"></i>
    </button>

    <!-- Profile -->
    <div class="profile-section">

      <img src="assets/profile.jpg" alt="Profile" class="profile-img"/>

      <h1>Mande</h1>

      <p class="bio">
        Web Developer • Photographer • Creative
      </p>

      <div class="stats">
        <div>
          <h3 id="viewCount">0</h3>
          <span>Views</span>
        </div>

        <div>
          <h3>24/7</h3>
          <span>Available</span>
        </div>
      </div>

    </div>

    <!-- Main Buttons -->
    <div class="links">

      <a href="https://wa.me/27658857907"
         class="link-btn whatsapp"
         target="_blank">
         <i class="fa-brands fa-whatsapp"></i>
         WhatsApp
      </a>

      <a href="https://instagram.com/mandecmande"
         class="link-btn instagram"
         target="_blank">
         <i class="fa-brands fa-instagram"></i>
         Instagram
      </a>

      <a href="https://tiktok.com/@celestech.h"
         class="link-btn tiktok"
         target="_blank">
         <i class="fa-brands fa-tiktok"></i>
         TikTok
      </a>

      <a href="https://facebook.com/celestmoise.mandemande"
         class="link-btn facebook"
         target="_blank">
         <i class="fa-brands fa-facebook"></i>
         Facebook
      </a>

      <a href="mailto:mandecmande@gmail.com"
         class="link-btn email">
         <i class="fa-solid fa-envelope"></i>
         Email
      </a>

      <a href="tel:+27658857907"
         class="link-btn phone">
         <i class="fa-solid fa-phone"></i>
         Call Me
      </a>

      <a href="mande.vcf"
         class="link-btn save"
         download>
         <i class="fa-solid fa-address-card"></i>
         Save Contact
      </a>

      <!-- <a href="https://yourportfolio.com"
         class="link-btn portfolio"
         target="_blank">
         <i class="fa-solid fa-globe"></i>
         Portfolio
      </a> -->

    </div>

    <!-- QR Code -->
    <div class="qr-section">

      <h2>Scan My QR Code</h2>

      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://planetceles.github.io/mande/"
        alt="QR Code"
        class="qr-image"
      />

      <button id="shareBtn" class="share-btn">
        <i class="fa-solid fa-share"></i>
        Share Profile
      </button>

    </div>

    <!-- Footer -->
    <footer>
      © 2026 Mande. All Rights Reserved.
    </footer>

  </div>

  <!-- <script src="script.js"></script> -->

</body>
</html>
